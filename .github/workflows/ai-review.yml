name: AI Review
on: [ pull_request ]
permissions:
  pull-requests: write
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: drew2a/ai-review@v2
        env:
          LLM_MODEL: ${{ secrets.ANTHROPIC_LLM_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_LLM_API_KEY }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

          add_review_resolution: true
